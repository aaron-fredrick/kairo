<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | Kairo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background-color: #1e1e1e;
        color: #cccccc;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* Subtle animated background grid */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(0, 122, 204, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 122, 204, 0.04) 1px, transparent 1px);
        background-size: 48px 48px;
        animation: grid-drift 20s linear infinite;
        pointer-events: none;
      }

      @keyframes grid-drift {
        0%   { background-position: 0 0; }
        100% { background-position: 48px 48px; }
      }

      .container {
        position: relative;
        text-align: center;
        padding: 3rem 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
        max-width: 480px;
        width: 100%;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        margin-bottom: 1rem;
        text-decoration: none;
      }

      .logo-icon {
        font-size: 1.5rem;
        background: #007acc;
        width: 40px;
        height: 40px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        box-shadow: 0 0 20px rgba(0, 122, 204, 0.4);
      }

      .logo-text {
        font-size: 1.4rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        color: #ffffff;
      }

      .code {
        font-size: clamp(6rem, 20vw, 9rem);
        font-weight: 800;
        line-height: 1;
        background: linear-gradient(135deg, #007acc 0%, #00c4ff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 0 40px rgba(0, 122, 204, 0.35));
        user-select: none;
      }

      .divider {
        width: 48px;
        height: 2px;
        background: linear-gradient(90deg, transparent, #007acc, transparent);
        border-radius: 2px;
      }

      .heading {
        font-size: 1.35rem;
        font-weight: 700;
        color: #e5e7eb;
      }

      .description {
        font-size: 0.95rem;
        color: #6b7280;
        line-height: 1.6;
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 0.5rem;
        padding: 0.75rem 1.75rem;
        background: #007acc;
        color: #ffffff;
        font-family: inherit;
        font-size: 0.95rem;
        font-weight: 600;
        text-decoration: none;
        border-radius: 8px;
        transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
        box-shadow: 0 4px 16px rgba(0, 122, 204, 0.3);
      }

      .back-btn:hover {
        background: #0098ff;
        transform: translateY(-1px);
        box-shadow: 0 6px 24px rgba(0, 122, 204, 0.45);
      }

      .back-btn:active {
        transform: translateY(0);
      }

      .arrow {
        font-size: 1rem;
        transition: transform 0.2s ease;
      }

      .back-btn:hover .arrow {
        transform: translateX(-3px);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <a class="logo" href="/">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">KAIRO</span>
      </a>

      <div class="code">404</div>
      <div class="divider"></div>

      <h1 class="heading">Page not found</h1>
      <p class="description">
        The path you're looking for doesn't exist or has been moved.<br />
        Head back to the chat.
      </p>

      <a class="back-btn" href="/">
        <span class="arrow">←</span>
        Back to Kairo
      </a>
    </div>
  </body>
</html>
