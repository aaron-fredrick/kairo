name: CD Main

on:
  workflow_run:
    workflows:
      - CI Merge (main)
    types:
      - completed
    branches:
      - main

permissions:
  contents: write
  security-events: none
  packages: write

jobs:
  cd-publish:
    name: Publish GHCR Images
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build kairo-frontend
        run: |
          cp infra/docker/frontend.Dockerfile.dockerignore .dockerignore
          docker build \
            -f infra/docker/frontend.Dockerfile \
            --target runner \
            -t ghcr.io/${{ github.repository }}/kairo-frontend:latest .

      - name: Build kairo-backend
        run: |
          cp infra/docker/backend.Dockerfile.dockerignore .dockerignore
          docker build \
            -f infra/docker/backend.Dockerfile \
            --target backend \
            -t ghcr.io/${{ github.repository }}/kairo-backend:latest .

      - name: Build kairo-server
        run: |
          cp infra/docker/server.Dockerfile.dockerignore .dockerignore
          docker build \
            -f infra/docker/server.Dockerfile \
            --target server \
            -t ghcr.io/${{ github.repository }}/kairo-server:latest .

      - name: Build kairo-register
        run: |
          cp infra/docker/register.Dockerfile.dockerignore .dockerignore
          docker build \
            -f infra/docker/register.Dockerfile \
            -t ghcr.io/${{ github.repository }}/kairo-register:latest .

      - name: Push Images
        run: |
          docker push ghcr.io/${{ github.repository }}/kairo-frontend:latest
          docker push ghcr.io/${{ github.repository }}/kairo-backend:latest
          docker push ghcr.io/${{ github.repository }}/kairo-server:latest
          docker push ghcr.io/${{ github.repository }}/kairo-register:latest

      - name: Export Images as Artifacts
        run: |
          mkdir -p artifacts
          docker save ghcr.io/${{ github.repository }}/kairo-frontend:latest | gzip > artifacts/kairo-frontend.tar.gz
          docker save ghcr.io/${{ github.repository }}/kairo-backend:latest  | gzip > artifacts/kairo-backend.tar.gz
          docker save ghcr.io/${{ github.repository }}/kairo-server:latest   | gzip > artifacts/kairo-server.tar.gz
          docker save ghcr.io/${{ github.repository }}/kairo-register:latest | gzip > artifacts/kairo-register.tar.gz

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: artifacts/