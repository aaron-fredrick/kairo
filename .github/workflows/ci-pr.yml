# Pull request gate: unit + component + integration (coverage), smoke.
name: CI PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies and build
        working-directory: ./frontend
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          npm install --legacy-peer-deps
          npm run build

  lint-backend:
    name: Lint Backend (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check . --output-format sarif -o ruff-results.sarif
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ruff-results.sarif
          category: ruff

  lint-frontend:
    name: Lint Frontend (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install ESLint and SARIF formatter
        working-directory: ./frontend
        run: |
          npm install --legacy-peer-deps
          npm install eslint @microsoft/eslint-formatter-sarif --no-save --legacy-peer-deps
      - name: Run ESLint
        working-directory: ./frontend
        run: npx eslint . -f @microsoft/eslint-formatter-sarif -o eslint-results.sarif || true
      - uses: github/codeql-action/upload-sarif@v4
        if: hashFiles('frontend/eslint-results.sarif') != ''
        with:
          sarif_file: frontend/eslint-results.sarif
          category: eslint

  static-analysis:
    name: Static Analysis (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "bandit[sarif]"
      - run: bandit -r app_backend/ app_register/ shared/ -f sarif -o bandit-results.sarif
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: "."
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  test:
    name: Backend Tests (unit, component, integration, smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Pytest (coverage)
        env:
          ENV: test
          DB_BACKEND: sqlite
          SQLITE_URL: sqlite+aiosqlite:///./data/test/ci-pytest.db
          EVENT_BUS: local
          JWT_SECRET: test-jwt-secret-for-ci-only
          ADMIN_PASSWORD: admin
          DATA_DIR: data/test
        run: |
          mkdir -p data/test
          rm -f data/test/ci-pytest.db
          pytest tests/app_backend tests/app_register tests/shared -m "unit or component" \
            --cov=app_backend --cov=app_register --cov-config=.coveragerc --cov-report=xml:coverage.xml \
            --junitxml=junit-unit-component.xml -v
          pytest tests/app_backend -m integration \
            --cov=app_backend --cov-config=.coveragerc --cov-append --cov-report=xml:coverage.xml \
            --junitxml=junit-integration.xml -v
      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ github.workspace }}/coverage.xml
          report_type: coverage
          disable_search: true
          flags: backend,pr
          verbose: true
          fail_ci_if_error: true
      - name: Run Pytest (smoke, e2e)
        env:
          ENV: test
          DB_BACKEND: sqlite
          SQLITE_URL: sqlite+aiosqlite:///./data/test/ci-pytest.db
          EVENT_BUS: local
          JWT_SECRET: test-jwt-secret-for-ci-only
          ADMIN_PASSWORD: admin
          DATA_DIR: data/test
        run: |
          pytest tests/app_backend -m smoke --junitxml=junit-smoke.xml -v
          pytest tests/app_backend -m e2e --junitxml=junit-e2e.xml -v
      - name: Upload test results to Codecov
        if: success()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          disable_search: true
          files: junit-unit-component.xml,junit-integration.xml,junit-smoke.xml,junit-e2e.xml
          fail_ci_if_error: false
