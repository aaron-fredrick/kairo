# Feature-branch push: unit + component (coverage), smoke. No integration.
name: CI Push

on:
  push:
    branches-ignore:
      - main
    tags-ignore:
      - "**"

permissions:
  contents: read
  security-events: write

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies and build
        working-directory: ./frontend
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          npm install --legacy-peer-deps
          npm run build

  lint-backend:
    name: Lint Backend (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check . --output-format sarif -o ruff-results.sarif
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ruff-results.sarif
          category: ruff

  lint-frontend:
    name: Lint Frontend (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install ESLint and SARIF formatter
        working-directory: ./frontend
        run: npm install eslint @microsoft/eslint-formatter-sarif --no-save
      - name: Run ESLint
        working-directory: ./frontend
        run: npx eslint . -f @microsoft/eslint-formatter-sarif -o eslint-results.sarif || true
      - uses: github/codeql-action/upload-sarif@v4
        if: hashFiles('frontend/eslint-results.sarif') != ''
        with:
          sarif_file: frontend/eslint-results.sarif
          category: eslint

  static-analysis:
    name: Static Analysis (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "bandit[sarif]"
      - run: bandit -r app/ -f sarif -o bandit-results.sarif
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: "."
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  test:
    name: Backend Tests (unit, component, smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Pytest
        env:
          ENV: test
          DB_BACKEND: sqlite
          SQLITE_URL: sqlite+aiosqlite:///./data/test/ci-pytest.db
          EVENT_BUS: local
          JWT_SECRET: test-jwt-secret-for-ci-only
          ADMIN_PASSWORD: admin
          DATA_DIR: data/test
        run: |
          mkdir -p data/test
          rm -f data/test/ci-pytest.db
          pytest -m "unit or component" \
            --cov=app --cov-config=.coveragerc --cov-report=xml:coverage.xml \
            --junitxml=junit-unit-component.xml -v
          pytest -m smoke --junitxml=junit-smoke.xml -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            junit-*.xml
            coverage.xml

  codecov:
    name: Codecov
    runs-on: ubuntu-latest
    needs: test
    if: always() && needs.test.result != 'cancelled'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: test-results
      - uses: codecov/codecov-action@v5
        if: hashFiles('coverage.xml') != ''
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: backend,push
          fail_ci_if_error: false
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: junit-unit-component.xml,junit-smoke.xml
