name: CI Push
'on':
  push:
    branches-ignore:
    - main
    tags-ignore:
    - '**'
permissions:
  contents: read
  security-events: write
  packages: write
jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Install dependencies and build
      working-directory: ./frontend
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      run: |
        npm install --legacy-peer-deps
        npm run build
  build-container:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build kairo-frontend
      run: docker build -f infra/docker/frontend.Dockerfile --target runner -t kairo-frontend .
    - name: Build kairo-backend
      run: docker build -f infra/docker/backend.Dockerfile --target backend -t kairo-backend .
    - name: Build kairo-server
      run: docker build -f infra/docker/server.Dockerfile --target server -t kairo-server .
    - name: Build kairo-register
      run: docker build -f infra/docker/register.Dockerfile -t kairo-register .
  lint-backend:
    name: Lint Backend (Ruff)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - run: pip install ruff
    - run: ruff check . --output-format sarif -o ruff-results.sarif
      continue-on-error: true
    - uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ruff-results.sarif
        category: ruff
  lint-frontend:
    name: Lint Frontend (ESLint)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Install and Run ESLint
      working-directory: ./frontend
      run: |-
        npm install --legacy-peer-deps
        npm install eslint @microsoft/eslint-formatter-sarif --no-save --legacy-peer-deps
        npx eslint . -f @microsoft/eslint-formatter-sarif -o eslint-results.sarif || true
    - uses: github/codeql-action/upload-sarif@v4
      if: hashFiles('frontend/eslint-results.sarif') != ''
      with:
        sarif_file: frontend/eslint-results.sarif
        category: eslint
  static-backend:
    name: Static Analysis Backend (MyPy)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - run: pip install mypy
    - run: mypy app_backend/ app_register/ shared/ || true
  static-frontend:
    name: Static Analysis Frontend (Svelte Check)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Install and Run Svelte Check
      working-directory: ./frontend
      run: |-
        npm install --legacy-peer-deps
        npx svelte-check || true
  security:
    name: Security Scan (Bandit, Trivy, Audits)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Pip Audit
      run: |-
        pip install pip-audit
        pip-audit || true
    - name: NPM Audit
      working-directory: ./frontend
      run: npm audit || true
    - name: Bandit
      run: |-
        pip install "bandit[sarif]"
        bandit -r app_backend/ app_register/ shared/ -f sarif -o bandit-results.sarif
      continue-on-error: true
    - uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: bandit-results.sarif
        category: bandit
    - uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        format: sarif
        output: trivy-results.sarif
        severity: CRITICAL,HIGH
    - uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: trivy-results.sarif
        category: trivy
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Run Pytest (coverage)
      env:
        ENV: test
        DB_BACKEND: sqlite
        SQLITE_URL: sqlite+aiosqlite:///./data/test/ci-pytest.db
        EVENT_BUS: local
        JWT_SECRET: test-jwt-secret-for-ci-only
        ADMIN_PASSWORD: admin
        DATA_DIR: data/test
      run: |-
        mkdir -p data/test
        rm -f data/test/ci-pytest.db
        pytest tests/app_backend tests/app_register tests/shared -m "unit or component" \
          --cov=app_backend --cov=app_register --cov-config=.coveragerc --cov-report=xml:coverage.xml \
          --junitxml=junit-unit-component.xml -v
    - name: Upload coverage to Codecov
      if: success()
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ${{ github.workspace }}/coverage.xml
        report_type: coverage
        disable_search: true
        flags: backend,pr
        verbose: true
        fail_ci_if_error: true
    - name: Run Pytest (extended test matrix)
      env:
        ENV: test
        DB_BACKEND: sqlite
        SQLITE_URL: sqlite+aiosqlite:///./data/test/ci-pytest.db
        EVENT_BUS: local
        JWT_SECRET: test-jwt-secret-for-ci-only
        ADMIN_PASSWORD: admin
        DATA_DIR: data/test
      run: |-
        pytest tests/app_backend -m smoke --junitxml=junit-smoke.xml -v
        pytest tests/app_backend -m e2e --junitxml=junit-e2e.xml -v
        pytest tests/app_backend -m regression --junitxml=junit-regression.xml -v || true
        pytest tests/app_backend -m functional --junitxml=junit-functional.xml -v || true
        pytest tests/app_backend -m contract --junitxml=junit-contract.xml -v || true
    - name: Upload test results to Codecov
      if: success()
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        report_type: test_results
        disable_search: true
        files: junit-unit-component.xml,junit-smoke.xml,junit-e2e.xml,junit-regression.xml,junit-functional.xml,junit-contract.xml
        fail_ci_if_error: false
        handle_no_reports_found: true
