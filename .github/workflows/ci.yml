name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write

jobs:
  # =========================================
  # BUILD
  # =========================================
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install dependencies and build
        working-directory: ./frontend
        run: |
          npm install --legacy-peer-deps
          npm run build

  # =========================================
  # LINT (BACKEND) -> SARIF
  # =========================================
  lint-backend:
    name: Lint Backend (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Ruff
        run: pip install ruff
        
      - name: Run Ruff
        # Generate SARIF format output
        run: ruff check . --output-format sarif -o ruff-results.sarif
        continue-on-error: true
        
      - name: Upload Ruff SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ruff-results.sarif
          category: ruff

  # =========================================
  # LINT (FRONTEND) -> SARIF
  # =========================================
  lint-frontend:
    name: Lint Frontend (ESLint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install ESLint and SARIF formatter
        working-directory: ./frontend
        run: npm install eslint @microsoft/eslint-formatter-sarif --no-save
        
      - name: Run ESLint
        working-directory: ./frontend
        # Runs ESLint if configured, outputs to SARIF
        run: npx eslint . -f @microsoft/eslint-formatter-sarif -o eslint-results.sarif || true
        
      - name: Upload ESLint SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: hashFiles('frontend/eslint-results.sarif') != ''
        with:
          sarif_file: frontend/eslint-results.sarif
          category: eslint

  # =========================================
  # STATIC ANALYSIS -> SARIF
  # =========================================
  static-analysis:
    name: Static Analysis (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Bandit
        run: pip install bandit[sarif]
        
      - name: Run Bandit
        # Scan the 'app' directory, output SARIF
        run: bandit -r app/ -f sarif -o bandit-results.sarif
        continue-on-error: true
        
      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  # =========================================
  # SECURITY -> SARIF
  # =========================================
  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # =========================================
  # TEST -> XML
  # =========================================
  test:
    name: Unit Tests (Pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx pytest-asyncio
          
      - name: Run Pytest
        # Start the server in the background for integration and smoke tests
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          sleep 3
          pytest --junitxml=test-report.xml
        continue-on-error: true
        
      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-report.xml
