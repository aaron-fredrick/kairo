name: CD Tag

on:
  workflow_run:
    workflows:
      - CI Tag
    types:
      - completed

permissions:
  contents: write
  security-events: none
  packages: write

jobs:
  cd-publish:
    name: Publish GHCR Images
    runs-on: ubuntu-${{ github.event.workflow_run.head_branch }}

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Backend Images
        run: |
          cp infra/docker/dockerignore.backend .dockerignore

          docker build \
            -f infra/docker/app-backend.local.Dockerfile \
            --target runner \
            -t ghcr.io/${{ github.repository }}/kairo-backend:${{ github.event.workflow_run.head_branch }} .

      - name: Build Register Service
        run: |
          cp infra/docker/dockerignore.register .dockerignore

          docker build \
            -f infra/docker/app-register.Dockerfile \
            -t ghcr.io/${{ github.repository }}/kairo-register:${{ github.event.workflow_run.head_branch }} .

      - name: Push Images
        run: |
          docker push ghcr.io/${{ github.repository }}/kairo-backend:${{ github.event.workflow_run.head_branch }}
          docker push ghcr.io/${{ github.repository }}/kairo-register:${{ github.event.workflow_run.head_branch }}

      - name: Export Images as Artifacts
        run: |
          mkdir -p artifacts

          docker save ghcr.io/${{ github.repository }}/kairo-backend:${{ github.event.workflow_run.head_branch }} | gzip > artifacts/kairo-backend.tar.gz
          docker save ghcr.io/${{ github.repository }}/kairo-register:${{ github.event.workflow_run.head_branch }} | gzip > artifacts/kairo-register.tar.gz

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: artifacts/

    if: github.event.workflow_run.conclusion == 'success'