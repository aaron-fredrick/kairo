name: Bug Report
description: Create a report to help us improve Kairo
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug in Kairo! Please provide as much detail as possible.
  - type: input
    id: version
    attributes:
      label: Kairo Version
      description: What version of Kairo are you running?
      placeholder: e.g., 1.0.0
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Are you running via Docker or native/local?
      options:
        - Docker Compose
        - Native (start.sh / start.bat)
        - Kubernetes
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Screenshots
      description: Please paste any relevant logs, stack traces, or screenshots here.
      render: shell
