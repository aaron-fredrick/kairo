[pytest]
testpaths = tests
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
markers =
    unit: Isolated logic (validators, parsers, business rules)
    component: Subsystem tests (auth module, admin service, WS manager)
    integration: Cross-component tests (API, DB, Redis interactions)
    regression: Previously fixed bugs must stay fixed
    smoke: Operational sanity checks (app starts, critical endpoints)
    e2e: Full user workflows (login, message send, delivery)
    functional: Feature behavior against requirements
    acceptance: Business/release requirements (limits, latency)
    contract: Service interface consistency
    load: Expected operational traffic
    stress: Breaking point under extreme load
    spike: Sudden traffic bursts
    soak: Long-term stability (memory leaks, handle exhaustion)
    chaos: Failure recovery (node kill, Redis restart)
