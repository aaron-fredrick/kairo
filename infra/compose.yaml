version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kairo_prod_db
    restart: always
    environment:
      POSTGRES_USER: kairo
      POSTGRES_PASSWORD: kairo_password_prod
      POSTGRES_DB: kairo
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kairo"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: kairo_prod_redis
    restart: always
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build:
      context: ../
      dockerfile: infra/docker/app.Dockerfile
    container_name: kairo_prod_app
    restart: always
    environment:
      - ENV=production
      - DEBUG=false
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=kairo
      - DB_PASSWORD=kairo_password_prod
      - DB_NAME=kairo
      - DATABASE_URL=postgresql+asyncpg://kairo:kairo_password_prod@db:5432/kairo
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=change_me_in_prod_987654321
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: nginx:alpine
    container_name: kairo_prod_web
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/web.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  postgres_prod_data:
  redis_prod_data:
