# Single app-backend + Caddy on :80 (frontend baked into image).
# docker compose -f compose/app-backend.local.yml up --build

services:
  app-backend:
    build:
      context: ..
      dockerfile: infra/docker/app-backend.local.Dockerfile
      target: runner
    restart: unless-stopped
    volumes:
      - ../data:/usr/src/app/data
    environment:
      ENV: production
      EVENT_BUS: local
      DB_BACKEND: sqlite
      DATABASE_URL: sqlite+aiosqlite:///data/db/kairo.db
      JWT_SECRET: ${JWT_SECRET:-change_me_in_prod}
      UPLOAD_BACKEND: local
      DATA_DIR: data
      REGISTER_ENABLED: "false"
    networks:
      - kairo

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
    volumes:
      - ../infra/proxy/caddy/Caddyfile.local:/etc/caddy/Caddyfile:ro
    depends_on:
      - app-backend
    networks:
      - kairo
