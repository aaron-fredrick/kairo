# PostgreSQL only (host :5432).
# docker compose -f compose/infra.postgresql.yml up

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kairo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kairo_password}
      POSTGRES_DB: ${POSTGRES_DB:-kairo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kairo}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kairo

networks:
  kairo:
    name: kairo

volumes:
  postgres_data:
