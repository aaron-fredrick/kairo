# Redis only (host :6379).
# docker compose -f compose/infra.redis.yml up

name: kairo

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kairo

networks:
  kairo:
    name: kairo

volumes:
  redis_data:
