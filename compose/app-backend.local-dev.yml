# Hot-reload app-backend, Vite frontend (:5173), Caddy :80.
# docker compose -f compose/app-backend.local-dev.yml up --build

name: kairo

services:
  app-backend:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
      target: backend
    restart: unless-stopped
    command: >
      uvicorn app_backend.main:app --host 0.0.0.0 --port 8000 --reload --proxy-headers
    volumes:
      - ../app_backend:/usr/src/app/app_backend
      - ../shared:/usr/src/app/shared
      - ../data:/usr/src/app/data
    environment:
      ENV: development
      EVENT_BUS: local
      DB_BACKEND: sqlite
      DATABASE_URL: sqlite+aiosqlite:///data/db/kairo.db
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret}
      UPLOAD_BACKEND: local
      DATA_DIR: data
      REGISTER_ENABLED: "false"
      CORS_ORIGINS: http://localhost,http://127.0.0.1,http://localhost:5173
    networks:
      - kairo

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci --legacy-peer-deps && npm run dev -- --host 0.0.0.0"
    volumes:
      - ../frontend:/app
    ports:
      - "5173:5173"
    networks:
      - kairo

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
    volumes:
      - ../infra/proxy/caddy/Caddyfile.local-dev:/etc/caddy/Caddyfile:ro
    depends_on:
      - app-backend
      - frontend
    networks:
      - kairo

networks:
  kairo:
    name: kairo
