# Hot-reload app-backend, Vite frontend (:5173), Caddy :80.
# docker compose -f compose/base.yml -f compose/app-backend.local-dev.yml up --build

services:
  app-backend:
    build:
      context: ..
      dockerfile: infra/docker/app.Dockerfile
    restart: unless-stopped
    command: >
      uvicorn app_backend.main:app --host 0.0.0.0 --port 8000 --reload --proxy-headers
    volumes:
      - ../app_backend:/usr/src/app/app_backend
      - ../shared:/usr/src/app/shared
    environment:
      ENV: development
      EVENT_BUS: redis
      DB_BACKEND: postgres
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-kairo}:${POSTGRES_PASSWORD:-kairo_password}@postgres:5432/${POSTGRES_DB:-kairo}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret}
      UPLOAD_BACKEND: minio
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-username}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-password}
      MINIO_BUCKET: ${MINIO_BUCKET:-kairo}
      REGISTER_ENABLED: "false"
      CORS_ORIGINS: http://localhost,http://127.0.0.1,http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - kairo

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0"
    volumes:
      - ../frontend:/app
    ports:
      - "5173:5173"
    networks:
      - kairo

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
    volumes:
      - ../infra/proxy/caddy/Caddyfile.local-dev:/etc/caddy/Caddyfile:ro
    depends_on:
      - app-backend
      - frontend
    networks:
      - kairo
