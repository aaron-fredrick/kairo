version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kairo_db
    restart: always
    environment:
      POSTGRES_USER: kairo
      POSTGRES_PASSWORD: kairo_password
      POSTGRES_DB: kairo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kairo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kairo_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: minio-server
    restart: always
    command: server /data --address ":7000" --console-address ":7001"
    environment:
      MINIO_ROOT_USER: username
      MINIO_ROOT_PASSWORD: password
    ports:
      - "7000:7000"
      - "7001:7001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc
    container_name: kairo_minio_init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set kairo http://minio:7000 username password 2>/dev/null; do sleep 1; done;
      mc mb kairo/kairo --ignore-existing;
      exit 0;
      "

  app:
    build:
      context: .
      dockerfile: infra/docker/app.Dockerfile
    container_name: kairo_app
    restart: always
    environment:
      - ENV=production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=kairo
      - DB_PASSWORD=kairo_password
      - DB_NAME=kairo
      - DATABASE_URL=postgresql+asyncpg://kairo:kairo_password@db:5432/kairo
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=change_me_in_prod_987654321
      # Storage: local | s3 | minio | ftp
      - UPLOAD_BACKEND=minio
      - MINIO_ENDPOINT=http://minio:7000
      - MINIO_ACCESS_KEY=username
      - MINIO_SECRET_KEY=password
      - MINIO_BUCKET=kairo
      - MINIO_REGION=us-east-1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
  minio_data:
