# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration file names; The default combo is datetime and slug
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path path, aligned with current dir
prepend_sys_path = .

# timezone to use when rendering the date within the migration file as well as the filename.
# timezone =

# version path separator; as of Alembic 1.3, this defaults to os.pathsep
# version_locations = %(here)s/bar:%(here)s/bat:version_locations

# set to 'true' to run the environment during the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be loaded from sys.path
# lookup_path = false

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(style)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
style = %
